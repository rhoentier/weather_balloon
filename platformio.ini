; platformio.ini — Wetterballon
; Ein Repo, drei Environments:
;   flight  → Firmware der Flug-Einheit  (Heltec WiFi LoRa 32 V2)
;   ground  → Firmware der Bodenstation  (Heltec-Board)
;   native  → Unit-Tests, laufen auf dem Mac (KEIN ESP32 nötig)
;
; Befehle:
;   pio run    -e flight            kompilieren
;   pio run    -e flight -t upload  aufs Board flashen
;   pio test   -e native            Unit-Tests (schnell, lokal)
;   pio device monitor              serielle Ausgabe

[platformio]
default_envs = flight

; ---------- gemeinsame Basis NUR der ESP32-Builds ----------
; Bewusst NICHT [env], damit das native Test-Environment dieses Arduino-Zeug
; NICHT erbt (sonst will PlatformIO ein Board + Arduino-Framework für native).
[esp32_base]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    mikalhart/TinyGPSPlus               ; GPS / NMEA-Parsing
    adafruit/Adafruit BMP280 Library    ; T/Druck (I2C)
    electroniccats/MPU6050              ; IMU (I2C)
    milesburton/DallasTemperature       ; DS18B20 (1-Wire)
    paulstoffregen/OneWire              ; 1-Wire-Bus (von DallasTemperature genutzt)
    sandeepmistry/LoRa                  ; SX1276 (Heltec V2)

; ---------- Flug-Einheit ----------
[env:flight]
extends = esp32_base
board = heltec_wifi_lora_32_V2
build_src_filter = +<flight/>
lib_deps =
    ${esp32_base.lib_deps}
    olikraus/U8g2                       ; SSD1306 OLED (Heltec V2, board-intern)

; ---------- Bodenstation ----------
; Empfänger ist laut Konzept §7.1 ein Heltec V3. Falls doch ein V2 verwendet
; wird, hier auf heltec_wifi_lora_32_V2 umstellen.
[env:ground]
extends = esp32_base
board = heltec_wifi_lora_32_V3
build_src_filter = +<ground/>

; ---------- Native Unit-Tests (laufen auf dem Mac) ----------
; Erbt NICHTS von esp32_base → kein Board, kein Arduino, nur der reine
; Host-Compiler + Unity. Testet die hardware-freie Logik aus lib/telemetry.
[env:native]
platform = native
test_framework = unity
build_src_filter = +<../lib/telemetry/>
; Unity-Double-Asserts aktivieren (GPS lat/lon sind double); -Wall für saubere Logik.
build_flags = -D UNITY_INCLUDE_DOUBLE -D UNITY_DOUBLE_PRECISION=1e-9 -Wall
