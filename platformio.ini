; platformio.ini — Wetterballon
; Ein Repo, zwei Environments:
;   flight  → Firmware der Flug-Einheit  (Heltec WiFi LoRa 32 V2)
;   ground  → Firmware der Bodenstation  (Heltec-Board)
;
; Befehle:
;   pio run    -e flight            kompilieren
;   pio run    -e flight -t upload  aufs Board flashen
;   pio device monitor              serielle Ausgabe

[platformio]
default_envs = flight

; ---------- gemeinsame Basis der ESP32-Builds ----------
[esp32_base]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    mikalhart/TinyGPSPlus               ; GPS / NMEA-Parsing
    adafruit/Adafruit BME280 Library    ; T/Druck/Feuchte (I2C)
    adafruit/Adafruit Unified Sensor    ; Pflicht-Abhängigkeit der BME280-Lib
    electroniccats/MPU6050              ; IMU (I2C)
    milesburton/DallasTemperature       ; DS18B20 (1-Wire)
    paulstoffregen/OneWire              ; 1-Wire-Bus (von DallasTemperature genutzt)
    sandeepmistry/LoRa                  ; SX1276 (Heltec V2)

; ---------- Flug-Einheit ----------
[env:flight]
extends = esp32_base
board = heltec_wifi_lora_32_V2
build_src_filter = +<flight/>
lib_deps =
    ${esp32_base.lib_deps}
    olikraus/U8g2                       ; SSD1306 OLED (Heltec V2, board-intern)

; ---------- Bodenstation ----------
; Empfänger ist laut Konzept §7.1 ein Heltec V3. Falls doch ein V2 verwendet
; wird, hier auf heltec_wifi_lora_32_V2 umstellen.
[env:ground]
extends = esp32_base
board = heltec_wifi_lora_32_V3
build_src_filter = +<ground/>
